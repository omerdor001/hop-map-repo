[pytest]
# asyncio_mode=auto enables pytest-asyncio without needing @pytest.mark.asyncio decorators.
asyncio_mode = auto

# Suppress log output during passing tests.  On failure, pytest prints captured
# logs automatically in the failure report — no information is lost.
log_cli = false
log_level = WARNING

filterwarnings =
    ignore::DeprecationWarning:mongomock
    ignore::DeprecationWarning:websockets
    ignore::DeprecationWarning:uvicorn
markers =
    unit:        Pure unit tests with no external dependencies.
    concurrency: Tests that exercise concurrent async behaviour.
    integration: Tests that run against the full app stack (mocked DB, real HTTP).
